<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#140000;
    color:white;
}

/* HEADER */

header{
    background:#000;
    padding:15px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #2e0000;
}

.logo{
    font-size:30px;
    font-weight:800;
}

.logo span{
    color:#ff1a1a;
}

.menu{
    font-size:28px;
}

/* HERO */

.hero{
    padding:40px 20px;
    text-align:center;
    background:linear-gradient(to bottom,#220000,#140000);
}

.hero h1{
    color:#ffc400;
    font-size:42px;
    line-height:1.2;
    font-weight:800;
    text-shadow:0 0 20px rgba(255,196,0,.5);
}

.hero p{
    margin-top:15px;
    color:#ddd;
    font-size:17px;
}

.download-btn{
    margin-top:30px;
    display:block;
    background:linear-gradient(to bottom,#ffd000,#ffb300);
    color:#000;
    text-decoration:none;
    font-weight:800;
    padding:22px;
    border-radius:20px;
    font-size:24px;
    box-shadow:0 0 25px rgba(255,187,0,.5);
}

/* INFO BOX */

.stats{
    margin:25px 20px;
    background:#3a0000;
    border-radius:20px;
    display:flex;
    justify-content:space-around;
    padding:18px 10px;
    border:1px solid #5c1c1c;
}

.stat{
    text-align:center;
}

.stat small{
    color:#bbb;
    display:block;
    margin-bottom:5px;
}

.stat strong{
    color:#ffc400;
    font-size:18px;
}

/* TITLE */

.section-title{
    margin:35px 20px 20px;
    font-size:30px;
    font-weight:800;
    color:#ffc400;
    position:relative;
    padding-left:18px;
}

.section-title::before{
    content:"";
    width:6px;
    height:35px;
    background:red;
    position:absolute;
    left:0;
    top:3px;
    border-radius:10px;
}

/* GAMES */

.games{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    padding:0 20px;
}

.card{
    background:#250000;
    border-radius:25px;
    overflow:hidden;
    border:2px solid #402020;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#ffc400;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card h3{
    font-size:18px;
    margin-bottom:10px;
}

.tag{
    background:#ffc400;
    color:#000;
    padding:6px 14px;
    border-radius:10px;
    font-size:13px;
    font-weight
